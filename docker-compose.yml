services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APP_VERSION=2.0.1
    image: aibo-app
    volumes:
      - .:/app
      - ${APPDATA}/gcloud:/root/.config/gcloud:ro
    env_file:
      - test.env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
    ports:
      - "8080:8080"